<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mobility Intelligence — Fortnightly Update</title>
<style>
:root {
  --ds-space-01: 2px; --ds-space-02: 4px; --ds-space-03: 8px; --ds-space-04: 16px;
  --ds-space-05: 24px; --ds-space-06: 32px; --ds-space-07: 40px; --ds-space-08: 48px;
  --ds-space-09: 64px; --ds-space-10: 80px; --ds-space-11: 96px; --ds-space-12: 160px;

  --ds-font-sans: Arial, Helvetica, sans-serif;

  --ds-color-company-red:       #CC0000;
  --ds-color-company-red-hover: #9D1B22;
  --ds-color-black:             #121212;
  --ds-color-white:             #FFFFFF;

  --ds-text-black:    #000000;
  --ds-text-dark:     #333333;
  --ds-text-regular:  #717171;
  --ds-text-body:     #616568;
  --ds-text-helper:   #767676;
  --ds-text-on-color: #FFFFFF;

  --ds-gray-x-light:  #F9F9F9;
  --ds-gray-light:    #ECECEC;
  --ds-gray-medium:   #CCCCCC;
  --ds-gray-dark:     #A3A3A3;
  --ds-stroke:        #D8D8D8;

  --ds-success:       #07C29F;
  --ds-success-light: #DAF2ED;
  --ds-warning:       #F1C21B;
  --ds-warning-light: #FEF7E8;
  --ds-error:         #CC0000;
  --ds-error-light:   #F2DFD8;

  --ds-background:        var(--ds-color-white);
  --ds-background-hover:  rgba(0, 0, 0, 0.04);
  --ds-layer-tinted:      var(--ds-gray-x-light);

  --ds-shadow-card: 0 14px 42px 0 rgba(8, 15, 52, 0.06);
  --ds-nav-height: 64px;

  --ds-red-100: #FF6666; --ds-red-200: #CC0000; --ds-red-300: #990000; --ds-red-400: #660000;
  --ds-violet-100: #D5D6FF; --ds-violet-200: #988FEC; --ds-violet-300: #5E4ADC;
  --ds-purple-100: #B4A2CB; --ds-purple-200: #926F98; --ds-purple-300: #4F0731;
  --ds-chart-gray-100: #D2D2D1; --ds-chart-gray-200: #A5A5A4; --ds-chart-gray-300: #777776;
  --ds-chart-gray-400: #343432; --ds-chart-gray-500: #000000;
  --ds-other-100: #F2EEE9; --ds-other-200: #DCD1C9; --ds-other-300: #C6B3A8;
  --ds-diverging-1: #4F0731; --ds-diverging-2: #7C4C76; --ds-diverging-3: #A891BA;
  --ds-diverging-4: #D5D6FF; --ds-diverging-5: #DDABD3; --ds-diverging-6: #DD476D; --ds-diverging-7: #FF0024;
  --ds-nps-red: #CC0000; --ds-nps-gray: #979797; --ds-nps-yellow: #FFCC00;

  --ds-surface: var(--ds-color-white);
  --ds-surface-text: var(--ds-text-dark);
  --ds-surface-heading: var(--ds-text-black);
  --ds-surface-divider: var(--ds-stroke);
  --ds-surface-eyebrow: var(--ds-color-company-red);
}

html, body { font-family: var(--ds-font-sans); color: var(--ds-surface-text); background: var(--ds-surface); margin: 0; font-size: 18px; line-height: 28px; }
* { box-sizing: border-box; }

/* ===== Level 1: primary nav ===== */
.nav {
  position: sticky; top: 0; height: var(--ds-nav-height); z-index: 100;
  background: var(--ds-color-white); border-bottom: 2px solid var(--ds-color-black);
  display: flex; align-items: center; padding: 0 var(--ds-space-06); gap: var(--ds-space-05);
}
.nav__brand { display: flex; align-items: center; gap: var(--ds-space-03); font-weight: 700; font-size: 18px; color: var(--ds-text-black); white-space: nowrap; }
.nav__mark { width: 10px; height: 26px; background: var(--ds-color-company-red); flex-shrink: 0; }
.nav__brand span.sub { font-weight: 400; color: var(--ds-text-regular); font-size: 13px; }
.nav__links { display: flex; gap: var(--ds-space-02); margin-left: var(--ds-space-05); }
.nav__link {
  background: none; border: none; border-bottom: 3px solid transparent;
  font-family: var(--ds-font-sans); font-size: 15px; font-weight: 700; color: var(--ds-text-regular);
  padding: var(--ds-space-05) var(--ds-space-03) calc(var(--ds-space-05) - 3px); cursor: pointer; height: var(--ds-nav-height);
  white-space: nowrap;
}
.nav__link:hover { color: var(--ds-text-black); }
.nav__link[aria-current="true"] { color: var(--ds-color-company-red); border-bottom-color: var(--ds-color-company-red); }
.nav__link:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: -2px; }
.nav__count { font-size: 12px; background: var(--ds-color-company-red); color: var(--ds-text-on-color); border-radius: 45px; padding: 1px 7px; margin-left: var(--ds-space-02); vertical-align: middle; }
.nav__spacer { flex: 1; }
.nav__edition { font-size: 13px; font-weight: 700; color: var(--ds-text-regular); white-space: nowrap; }

/* ===== Level 2: value-chain sub nav ===== */
.subnav {
  position: sticky; top: var(--ds-nav-height); z-index: 90;
  background: var(--ds-gray-x-light); border-bottom: 1px solid var(--ds-stroke);
  padding: 0 var(--ds-space-06);
  display: flex; align-items: center; gap: var(--ds-space-02); flex-wrap: wrap;
}
.subnav__link {
  background: none; border: none; font-family: var(--ds-font-sans); font-size: 14px; font-weight: 700;
  color: var(--ds-text-regular); padding: var(--ds-space-04) var(--ds-space-04); cursor: pointer;
  border-bottom: 2px solid transparent;
}
.subnav__link:hover { color: var(--ds-text-black); }
.subnav__link[aria-current="true"] { color: var(--ds-text-black); border-bottom-color: var(--ds-color-company-red); }
.subnav__link:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: -2px; }

/* ===== Layout ===== */
.page { max-width: 1080px; margin: 0 auto; padding: var(--ds-space-07) var(--ds-space-06) var(--ds-space-10); }
.pagehead { border-bottom: 1px solid var(--ds-stroke); padding-bottom: var(--ds-space-04); margin-bottom: var(--ds-space-06); }
.eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ds-color-company-red); margin: 0 0 var(--ds-space-03); }
h1 { font-size: 40px; line-height: 46px; font-weight: 700; color: var(--ds-text-black); margin: 0 0 var(--ds-space-03); letter-spacing: -0.01em; }
.pagehead p { font-size: 18px; line-height: 26px; color: var(--ds-text-regular); margin: 0; max-width: 720px; }
.section-hidden { display: none; }

/* ===== Level 3: filters ===== */
.filterbar { display: flex; flex-direction: column; gap: var(--ds-space-03); margin-bottom: var(--ds-space-06); }
.geobar { display: flex; align-items: center; gap: var(--ds-space-03); flex-wrap: wrap; }
.geobar__label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ds-text-regular); margin-right: var(--ds-space-02); }
.geo-pill {
  font-family: var(--ds-font-sans); font-size: 14px; font-weight: 700; line-height: 20px;
  padding: var(--ds-space-02) var(--ds-space-04); border-radius: 45px;
  border: 2px solid var(--ds-gray-light); background: var(--ds-color-white);
  color: var(--ds-text-dark); cursor: pointer; min-height: 40px;
}
.geo-pill:hover { border-color: var(--ds-color-company-red); color: var(--ds-color-company-red); }
.geo-pill[aria-pressed="true"] { background: var(--ds-color-company-red); border-color: var(--ds-color-company-red); color: var(--ds-text-on-color); }
.geo-pill:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 2px; }

.results-count { font-size: 14px; color: var(--ds-text-regular); margin-bottom: var(--ds-space-05); }
.results-count strong { color: var(--ds-text-black); }

/* ===== Article rows (editorial) ===== */
.article-list { display: flex; flex-direction: column; }
.article {
  display: grid; grid-template-columns: 240px 1fr; gap: var(--ds-space-06);
  padding: var(--ds-space-06) 0; border-top: 1px solid var(--ds-stroke); align-items: start;
}
.article:first-child { border-top: none; }
.article__thumb {
  width: 240px; height: 150px; background: var(--ds-gray-light); position: relative; overflow: hidden;
  border: 1px solid var(--ds-stroke);
}
.article__thumb svg { width: 100%; height: 100%; display: block; }
.article__body { min-width: 0; }
.article__meta { display: flex; flex-wrap: wrap; gap: var(--ds-space-03); align-items: center; margin-bottom: var(--ds-space-03); }
.tag { display: inline-flex; align-items: center; gap: var(--ds-space-02); font-size: 12px; font-weight: 700; line-height: 16px; padding: 3px var(--ds-space-03); border: 1px solid var(--ds-stroke); background: var(--ds-gray-x-light); color: var(--ds-text-dark); text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
.tag--chain { border-color: var(--ds-color-company-red); color: var(--ds-color-company-red); background: var(--ds-color-white); }
.tag--flag { padding-left: var(--ds-space-02); text-transform: none; letter-spacing: 0; }
.tag__flag { width: 18px; height: 12px; flex-shrink: 0; display: inline-block; vertical-align: middle; border: 1px solid var(--ds-gray-light); }
.article__title { font-size: 24px; line-height: 30px; font-weight: 700; color: var(--ds-text-black); margin: 0 0 var(--ds-space-03); letter-spacing: -0.01em; }
.article__titlelink { color: var(--ds-text-black); text-decoration: none; }
.article__titlelink:hover { color: var(--ds-color-company-red); text-decoration: underline; }
.article__titlelink:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 2px; }
.article__summary { font-size: 16px; line-height: 25px; color: var(--ds-text-dark); margin: 0 0 var(--ds-space-04); }
.article__foot { display: flex; align-items: center; justify-content: space-between; gap: var(--ds-space-04); flex-wrap: wrap; }
.article__byline { font-size: 13px; color: var(--ds-text-regular); }
.article__byline .src { font-weight: 700; color: var(--ds-text-dark); }

/* Proposed-action box */
.action { margin-top: var(--ds-space-04); padding-top: var(--ds-space-04); border-top: 1px dashed var(--ds-stroke); }
.action__label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--ds-text-regular); margin-bottom: var(--ds-space-02); }
.action__row { display: flex; gap: var(--ds-space-03); align-items: flex-start; flex-wrap: wrap; }
.action__input {
  flex: 1; min-width: 220px; font-family: inherit; font-size: 14px; line-height: 20px;
  padding: var(--ds-space-03); border: 1px solid var(--ds-stroke); border-radius: 6px;
  resize: vertical; color: var(--ds-text-dark); background: var(--ds-color-white);
}
.action__input:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 1px; }
.action__save, .action__done {
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  padding: var(--ds-space-03) var(--ds-space-04); border-radius: 6px; min-height: 42px; white-space: nowrap;
}
.action__save { background: var(--ds-color-company-red); color: var(--ds-text-on-color); border: 1px solid var(--ds-color-company-red); }
.action__save:hover { background: var(--ds-color-company-red-hover); border-color: var(--ds-color-company-red-hover); }
.action__done { background: var(--ds-color-white); color: var(--ds-text-dark); border: 1px solid var(--ds-stroke); }
.action__done:hover { border-color: var(--ds-color-company-red); color: var(--ds-color-company-red); }
.action__save:focus-visible, .action__done:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 2px; }
.action--set { border-top-color: var(--ds-color-company-red); }
.action--set .action__label::after { content: " · open"; color: var(--ds-color-company-red); }

/* Save button */
.save-btn {
  display: inline-flex; align-items: center; gap: var(--ds-space-02);
  font-family: var(--ds-font-sans); font-size: 13px; font-weight: 700;
  background: var(--ds-color-white); border: 1px solid var(--ds-stroke); color: var(--ds-text-dark);
  padding: var(--ds-space-02) var(--ds-space-04); cursor: pointer; min-height: 40px; border-radius: 45px;
}
.save-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--ds-text-regular); stroke-width: 1.6; }
.save-btn:hover { border-color: var(--ds-color-company-red); color: var(--ds-color-company-red); }
.save-btn:hover svg { stroke: var(--ds-color-company-red); }
.save-btn[aria-pressed="true"] { border-color: var(--ds-color-company-red); color: var(--ds-color-company-red); }
.save-btn[aria-pressed="true"] svg { fill: var(--ds-color-company-red); stroke: var(--ds-color-company-red); }
.save-btn:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 2px; }

.empty { padding: var(--ds-space-09); text-align: center; color: var(--ds-text-regular); border: 1px dashed var(--ds-stroke); background: var(--ds-gray-x-light); }
.ds-btn { font-family: var(--ds-font-sans); font-size: 14px; font-weight: 700; line-height: 16px; text-transform: uppercase; padding: var(--ds-space-04) var(--ds-space-05); border: 1px solid transparent; border-radius: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; min-height: 52px; }
.ds-btn--white { background: var(--ds-color-white); color: var(--ds-color-company-red); border-color: var(--ds-stroke); }
.ds-btn--white:hover { background: var(--ds-color-company-red-hover); color: var(--ds-text-on-color); border-color: var(--ds-color-company-red-hover); }
.ds-btn:focus-visible { outline: 2px solid var(--ds-color-company-red); outline-offset: 2px; }

/* Opinions get a subtle distinction: author-forward */
.article--opinion .tag--chain { border-color: var(--ds-purple-300); color: var(--ds-purple-300); }

@media (max-width: 760px) {
  .nav { padding: 0 var(--ds-space-04); gap: var(--ds-space-03); overflow-x: auto; }
  .nav__edition, .nav__brand span.sub { display: none; }
  .subnav { padding: 0 var(--ds-space-04); overflow-x: auto; flex-wrap: nowrap; }
  .page { padding: var(--ds-space-05) var(--ds-space-04) var(--ds-space-09); }
  h1 { font-size: 30px; line-height: 36px; }
  .article { grid-template-columns: 1fr; gap: var(--ds-space-04); }
  .article__thumb { width: 100%; height: 180px; }
}
</style>
</head>
<body>

<!-- LEVEL 1 -->
<nav class="nav">
  <div class="nav__brand"><span class="nav__mark" aria-hidden="true"></span> Mobility Intelligence <span class="sub">ME &amp; Europe</span></div>
  <div class="nav__links" role="tablist">
    <button class="nav__link" role="tab" aria-current="true" data-view="latest">Latest News</button>
    <button class="nav__link" role="tab" aria-current="false" data-view="older">Older News</button>
    <button class="nav__link" role="tab" aria-current="false" data-view="opinions">Opinions</button>
    <button class="nav__link" role="tab" aria-current="false" data-view="saved">Saved Articles <span class="nav__count" id="savedCount" style="display:none">0</span></button>
    <button class="nav__link" role="tab" aria-current="false" data-view="pending">Pending Action <span class="nav__count" id="pendingCount" style="display:none">0</span></button>
  </div>
  <div class="nav__spacer"></div>
  <div class="nav__edition" id="navEdition">Snapshot: 23 Jul 2026 · live sources</div>
</nav>

<!-- LEVEL 2 (only for latest / older) -->
<div class="subnav" id="subnav" role="tablist" aria-label="Automotive value chain">
  <button class="subnav__link" role="tab" aria-current="true" data-chain="market">Market</button>
  <button class="subnav__link" role="tab" aria-current="false" data-chain="automakers">Automakers</button>
  <button class="subnav__link" role="tab" aria-current="false" data-chain="distribution">Distribution</button>
  <button class="subnav__link" role="tab" aria-current="false" data-chain="aftermarket">Aftermarket</button>
  <button class="subnav__link" role="tab" aria-current="false" data-chain="regulation">Regulation</button>
</div>

<main class="page">
  <div class="pagehead">
    <p class="eyebrow" id="ph-eyebrow">Latest News · Market</p>
    <h1 id="ph-title">Market</h1>
    <p id="ph-desc">Market and macroeconomic developments relevant to automotive distributors — sales volumes, demand shifts, logistics costs and macro shocks.</p>
  </div>

  <!-- LEVEL 3 -->
  <div class="filterbar" id="filterbar">
    <div class="geobar" id="geobar" role="group" aria-label="Region filter">
      <span class="geobar__label">Region</span>
      <button class="geo-pill" data-geo="" aria-pressed="true">All</button>
      <button class="geo-pill" data-geo="Middle East" aria-pressed="false">Middle East</button>
      <button class="geo-pill" data-geo="Europe" aria-pressed="false">Europe</button>
      <button class="geo-pill" data-geo="Rest of World" aria-pressed="false">Rest of World</button>
    </div>
  </div>

  <p class="results-count" id="resultsCount"></p>
  <div class="article-list" id="articleList"></div>
</main>

<script>
/* ============================================================
   TAXONOMY
   ============================================================ */
const CHAINS = {
  market:        { title:"Market",        desc:"Market, macroeconomic and consumer-trend developments relevant to distributors — sales volumes, demand shifts, buyer preferences and behaviour, logistics costs and macro shocks." },
  automakers:    { title:"Automakers",    desc:"News on vehicle and parts manufacturers — new products, powertrains, financial performance and strategy." },
  distribution:  { title:"Distribution",  desc:"News on distribution players across markets — retail innovation, agency models, products, network and financial performance." },
  aftermarket:   { title:"Aftermarket",   desc:"News on used cars, hire and rental, and maintenance and repair — including service players expanding, serving or partnering with distributors, and used-car, hire or rental firms partnering with distributors." },
  regulation:    { title:"Regulation",    desc:"Regulations relevant to automotive — tariffs, emissions standards, EV mandates, import rules and homologation." }
};
const REGIONS = ["Middle East","Europe","Rest of World"];

const FLAGS = {
  "UAE":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="6.66" y="0" fill="#00843D"/><rect y="6.66" width="30" height="6.66" fill="#fff"/><rect y="13.32" width="30" height="6.68" fill="#000"/><rect width="8" height="20" fill="#CE1126"/></svg>',
  "Saudi Arabia":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#006C35"/></svg>',
  "Germany":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="6.66" fill="#000"/><rect y="6.66" width="30" height="6.66" fill="#DD0000"/><rect y="13.32" width="30" height="6.68" fill="#FFCE00"/></svg>',
  "France":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="10" height="20" fill="#0055A4"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#EF4135"/></svg>',
  "UK":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#012169"/><path d="M0 0l30 20M30 0L0 20" stroke="#fff" stroke-width="3"/><path d="M15 0v20M0 10h30" stroke="#fff" stroke-width="5"/><path d="M15 0v20M0 10h30" stroke="#C8102E" stroke-width="3"/></svg>',
  "Qatar":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#8A1538"/><rect width="9" height="20" fill="#fff"/></svg>',
  "EU":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#003399"/><circle cx="15" cy="10" r="5" fill="none" stroke="#FFCC00" stroke-width="1.4" stroke-dasharray="0.55 2.05"/></svg>',
  "China":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#DE2910"/><circle cx="6" cy="6" r="2.4" fill="#FFDE00"/></svg>',
  "Egypt":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="6.66" fill="#CE1126"/><rect y="6.66" width="30" height="6.66" fill="#fff"/><rect y="13.32" width="30" height="6.68" fill="#000"/><circle cx="15" cy="10" r="2" fill="#C09300"/></svg>',
  "Oman":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect width="30" height="6.66" fill="#DB161B"/><rect y="13.32" width="30" height="6.68" fill="#008000"/><rect width="8" height="20" fill="#DB161B"/></svg>',
  "Italy":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="10" height="20" fill="#009246"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#CE2B37"/></svg>',
  "Global":'<svg class="tag__flag" viewBox="0 0 30 20"><rect width="30" height="20" fill="#E8EEF4"/><circle cx="15" cy="10" r="7" fill="none" stroke="#717171" stroke-width="1.1"/><path d="M8 10h14M15 3v14M9.5 6q5.5 4 11 0M9.5 14q5.5-4 11 0" fill="none" stroke="#717171" stroke-width="0.8"/></svg>'
};

/* Simple thumbnail illustrations per chain (renderable SVG, brand-safe) */
function thumbSVG(chain, seed){
  const g = ['#D2D2D1','#A5A5A4','#777776'][seed % 3];
  const scenes = {

/* ============================================================
   HELPERS
   ============================================================ */
function daysOld(iso){ return (TODAY - new Date(iso)) / 86400000; }
function isLatest(a){ return daysOld(a.date) <= 14; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function flag(c){ return FLAGS[c] || FLAGS.Global; }
function savedList(){ return ARTICLES.filter(a => saved[a.id]); }
function pendingList(){ return ARTICLES.filter(a => actions[a.id] && actions[a.id].trim()); }
// Strip trailing "  Publisher" / " - Publisher" tags feeds append to headlines.
function cleanTitle(t){
  return String(t || "")
    .replace(/\u00a0/g, ' ')          // nbsp -> space
    .replace(/\s+[-–—|]\s+[^-–—|]{1,40}$/, '')  // " - Publisher" style suffix
    .replace(/\s{2,}[A-Z][\w.& ]{1,40}$/, '')   // "  Publisher" (double-space) suffix
    .trim();
}

// Region is stored as an array of regions an article is relevant to.
// Accept legacy single-string `region` too, for feed compatibility.
function regionsOf(a){
  if (Array.isArray(a.regions)) return a.regions;
  if (typeof a.region === 'string') {
    return a.region === 'Global'
      ? ["Middle East","Europe","Rest of World"]
      : [a.region];
  }
  return [];
}
function matchesGeo(a, sel){ return !sel || regionsOf(a).includes(sel); }
function regionLabel(a){
  const r = regionsOf(a);
  const core = ["Middle East","Europe","Rest of World"];
  if (core.every(x => r.includes(x))) return "Global";
  return r.join(" · ");
}

/* ============================================================
   RENDER CARD
   ============================================================ */
function card(a, idx){
  const isSaved = !!saved[a.id];
  const chainLabel = a.type === "opinion" ? "Opinion" : CHAINS[a.chain].title;
  const title = cleanTitle(a.title);
  const titleHtml = a.url
    ? `<a class="article__titlelink" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(title)}</a>`
    : esc(title);
  const act = actions[a.id];               // saved proposed-action text, if any
  const hasAction = act && act.trim();
  return `
  <article class="article ${a.type==='opinion'?'article--opinion':''}">
    <div class="article__thumb">${thumbSVG(a.chain, idx)}</div>
    <div class="article__body">
      <div class="article__meta">
        <span class="tag tag--chain">${esc(chainLabel)}</span>
        <span class="tag tag--flag">${flag(a.country)} ${esc(a.country)}</span>
        <span class="tag">${esc(regionLabel(a))}</span>
      </div>
      <h2 class="article__title">${titleHtml}</h2>
      <p class="article__summary">${esc(a.summary)}</p>
      <div class="article__foot">
        <span class="article__byline"><span class="src">${esc(a.author)}</span> · ${fmtDate(a.date)}</span>
        <button class="save-btn" data-save="${a.id}" aria-pressed="${isSaved}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-5-7 5V4a1 1 0 0 1 1-1z"/></svg>
          ${isSaved ? 'Saved' : 'Save'}
        </button>
      </div>
      <div class="action ${hasAction ? 'action--set' : ''}">
        <label class="action__label" for="act-${a.id}">Proposed action</label>
        <div class="action__row">
          <textarea class="action__input" id="act-${a.id}" data-action-input="${a.id}"
            rows="1" placeholder="Add a proposed action…">${hasAction ? esc(act) : ''}</textarea>
          <button class="action__save" data-action-save="${a.id}">Save</button>
          <button class="action__done" data-action-done="${a.id}" title="Mark as done / delete"${hasAction ? '' : ' style="display:none"'}>Mark done</button>
        </div>
      </div>
    </div>
  </article>`;
}

  const desc = document.getElementById('ph-desc');
  const count = document.getElementById('resultsCount');

  let items = [];
  const showChain = (view === 'latest' || view === 'older');

  subnav.style.display = showChain ? 'flex' : 'none';
  filterbar.style.display = (showChain || view === 'opinions') ? 'flex' : 'none';

  if (view === 'saved'){
    eyebrow.textContent = "Saved Articles";
    title.textContent = "Saved Articles";
    desc.textContent = "Every article you've saved, across news and opinions. Saved items persist on this device.";
    items = savedList().sort((x,y)=> new Date(y.date) - new Date(x.date));
  } else if (view === 'pending'){
    eyebrow.textContent = "Pending Action";
    title.textContent = "Pending Action";
    desc.textContent = "Articles with a proposed action still open. Mark an action done to remove it from this list.";
    items = pendingList().sort((x,y)=> new Date(y.date) - new Date(x.date));
  } else if (view === 'opinions'){
    eyebrow.textContent = "Opinions";
    title.textContent = "Opinions";
    desc.textContent = "Perspectives from industry thought leaders — commentary and analysis, not reported news.";
    items = ARTICLES.filter(a => a.type === 'opinion');
    items = items.filter(a => matchesGeo(a, geo));
    items.sort((x,y)=> new Date(y.date) - new Date(x.date));
  } else {
    eyebrow.textContent = (view==='latest'?'Latest News':'Older News') + " · " + CHAINS[chain].title;
    title.textContent = CHAINS[chain].title;
    desc.textContent = CHAINS[chain].desc;
    items = ARTICLES.filter(a => a.type === 'news' && a.chain === chain && (view==='latest'? isLatest(a) : !isLatest(a)));
    items = items.filter(a => matchesGeo(a, geo));
    items.sort((x,y)=> new Date(y.date) - new Date(x.date));
  }

  if (view === 'saved'){
    count.innerHTML = items.length ? `<strong>${items.length}</strong> saved article${items.length>1?'s':''}` : "";
  } else if (view === 'pending'){
    count.innerHTML = items.length ? `<strong>${items.length}</strong> article${items.length>1?'s':''} awaiting action` : "";
  } else {
    const suffix = geo ? ` · ${geo}` : "";
    count.innerHTML = `<strong>${items.length}</strong> article${items.length!==1?'s':''}${suffix}`;
  }

  if (items.length){
    list.innerHTML = items.map((a,i)=>card(a,i)).join("");
  } else {
    const f = (geo?` in ${geo}`:"");
    let msg = "No articles here yet.";
    if (view==='saved') msg = "You haven't saved anything yet. Tap the Save button on any article to keep it here.";
    else if (view==='pending') msg = "No open actions. Add a proposed action on any article and it will appear here.";
    else if (view==='latest') msg = "No articles in the last two weeks for this section" + f + ". Try Older News or a different region.";
    else if (view==='older') msg = "No older articles for this section" + f + ".";
    else if (view==='opinions') msg = "No opinion pieces" + f + " right now.";
    list.innerHTML = `<div class="empty">${msg}</div>`;
  }

  const sc = document.getElementById('savedCount');
  const n = savedList().length;
  sc.textContent = n; sc.style.display = n ? 'inline-block' : 'none';
  const pc = document.getElementById('pendingCount');
  const pn = pendingList().length;
  pc.textContent = pn; pc.style.display = pn ? 'inline-block' : 'none';
}

/* ============================================================
   EVENTS
   ============================================================ */
document.querySelectorAll('.nav__link').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    view = btn.dataset.view;
    document.querySelectorAll('.nav__link').forEach(b=> b.setAttribute('aria-current', b===btn?'true':'false'));
    geo = "";
    document.querySelectorAll('#geobar .geo-pill').forEach(p=> p.setAttribute('aria-pressed', p.dataset.geo===''?'true':'false'));
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

document.querySelectorAll('.subnav__link').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    chain = btn.dataset.chain;
    document.querySelectorAll('.subnav__link').forEach(b=> b.setAttribute('aria-current', b===btn?'true':'false'));
    render();
  });
});

document.querySelectorAll('#geobar .geo-pill').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    geo = btn.dataset.geo;
    document.querySelectorAll('#geobar .geo-pill').forEach(b=> b.setAttribute('aria-pressed', b===btn?'true':'false'));
    render();
  });
});

document.getElementById('articleList').addEventListener('click', e=>{
  // Save / unsave
  const saveBtn = e.target.closest('[data-save]');
  if (saveBtn){
    const id = saveBtn.dataset.save;
    if (saved[id]) delete saved[id]; else saved[id] = true;
    persist();
    render();
    return;
  }
  // Save a proposed action
  const actSave = e.target.closest('[data-action-save]');
  if (actSave){
    const id = actSave.dataset.actionSave;
    const ta = document.querySelector(`[data-action-input="${id}"]`);
    const val = ta ? ta.value.trim() : "";
    if (val){ actions[id] = val; } else { delete actions[id]; }
    persistActions();
    render();
    return;
  }
  // Mark action done (delete it)
  const actDone = e.target.closest('[data-action-done]');
  if (actDone){
    const id = actDone.dataset.actionDone;
    delete actions[id];
    persistActions();
    render();
    return;
  }
});

/* INIT */
render();

/* ============================================================
   OPTIONAL LIVE FEED (Option B)
   If an articles.json sits next to this file (produced by
   fetch_feeds.py on a schedule), load it and re-render. If it's
   absent or blocked (e.g. opened via file://), we silently keep
   the built-in snapshot above. This lets the same file work both
   as a standalone snapshot and as a live-fed dashboard.
   ============================================================ */
(function tryLoadFeed(){
  fetch('articles.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const incoming = Array.isArray(data) ? data : (data && data.articles);
      if (incoming && incoming.length) {
        ARTICLES = incoming;
        if (data.generated) {
          const d = new Date(data.generated);
          if (!isNaN(d)) document.getElementById('navEdition').textContent =
            'Updated ' + d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) + ' · live feed';
        }
        render();
      }
    })
    .catch(() => { /* no feed available — keep built-in snapshot */ });
})();
</script>
